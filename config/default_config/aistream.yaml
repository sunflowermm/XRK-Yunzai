# AI 工作流全局配置（与 plugins/system-plugin/commonconfig/system.js aistream schema 对齐）
# 端口级覆盖：data/server_bots/{port}/aistream.yaml

enabled: true
streamDir: "plugins/stream"

global:
  maxTimeout: 30000
  debug: false
  maxConcurrent: 5

cache:
  enabled: true
  ttl: 300
  maxSize: 100

llm:
  Provider: gptgod
  timeout: 360000
  retry:
    enabled: true
    maxAttempts: 3
    delay: 2000
    retryOn:
      - timeout
      - network
      - "5xx"

asr:
  Provider: volcengine

tts:
  Provider: volcengine
  onlyForASR: true

mcp:
  enabled: true
  autoRegister: true
  remote:
    enabled: false
    selected: []
    servers: []
