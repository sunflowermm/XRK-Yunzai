# AI 工作流全局配置（与 plugins/system-plugin/commonconfig/system.js aistream schema 对齐）
# 端口级覆盖：data/server_bots/{port}/aistream.yaml

enabled: true
streamDir: "plugins/stream"

global:
  maxTimeout: 30000
  debug: false
  maxConcurrent: 5

cache:
  enabled: true
  ttl: 300
  maxSize: 100

llm:
  Provider: gptgod
  timeout: 360000
  # 全局默认生成参数（单次请求 / 工作流 config / 各 *_llm.yaml 提供商可覆盖）
  temperature: 0.8
  maxTokens: 6000
  topP: 0.9
  presencePenalty: 0.6
  frequencyPenalty: 0.6
  retry:
    enabled: true
    maxAttempts: 3
    delay: 2000
    retryOn:
      - timeout
      - network
      - "5xx"

mcp:
  enabled: true
  autoRegister: true
  remote:
    enabled: false
    selected: []
    servers: []
