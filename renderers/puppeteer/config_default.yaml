# Puppeteer 渲染器默认配置（端口级覆盖：data/server_bots/{port}/renderers/puppeteer/config.yaml）
headless: new
restartNum: 100
puppeteerTimeout: 120000
healthCheckInterval: 120000
# 长时间无截图则重启 Chromium，避免隔夜连接僵死（0 关闭）
idleRestartMs: 14400000
maxRetries: 3
retryDelay: 2000
memoryThreshold: 1024
maxConcurrent: 3
waitUntil: domcontentloaded
waitImages: true
waitFonts: true
imageWaitTimeout: 800
fontWaitTimeout: 800
imgType: jpeg
quality: 85
viewport:
  width: 1280
  height: 720
  deviceScaleFactor: 1
args:
  - --no-sandbox
  - --disable-setuid-sandbox
  - --disable-dev-shm-usage
  - --disable-gpu
blockResourceTypes:
  - media
