# AI 工作流全局配置（与 plugins/system-plugin/commonconfig/system.js aistream schema 对齐）
# 端口级覆盖：data/server_bots/{port}/aistream.yaml

enabled: true

global:
  maxTimeout: 30000
  debug: false
  maxConcurrent: 5

cache:
  # Agent/聊天工作流默认不缓存整轮结果；仅无工具、显式 config.cache: true 的只读流可 opt-in
  enabled: false
  ttl: 300
  maxSize: 100

llm:
  # 填写各工厂 providers[] 条目的 key（先在 data/server_bots/*_llm.yaml 配置端点）
  Provider: ""
  timeout: 360000
  # 全局默认生成参数（单次请求 / 工作流 config / 各 *_llm.yaml 提供商可覆盖）
  temperature: 0.8
  maxTokens: 6000
  topP: 0.9
  presencePenalty: 0.6
  frequencyPenalty: 0.6
  retry:
    enabled: true
    maxAttempts: 3
    delay: 2000
    retryOn:
      - timeout
      - network
      - "5xx"
  # Provider 提示缓存：提高前缀命中率、降低 input token 费用（OpenAI / Anthropic / DeepSeek 等）
  promptCache:
    enabled: true
    keyPrefix: xrk
    retention: in-memory
    anthropicCache: true
    scopeInKey: true

mcp:
  enabled: true
  autoRegister: true
  remote:
    enabled: false
    mcpServers: []

# Agent 文件工作区（tools / desktop MCP 的 cwd，控制台工作区预设）
workspace:
  defaultId: default

# 工作区上下文 → system prompt（AGENTS / rules / skills / subagents）
agentWorkspace:
  enabled: true
  root: ""
  streams: []
  includeRules: true
  includeAgentMd: true
  includeSubagents: true
  maxTotalChars: 0
  contextFiles: []
  maxCandidatesPerRoot: 300
  maxSkillsLoadedPerSource: 200
  maxSkillsInPrompt: 150
  maxSkillsPromptChars: 30000
  maxSkillFileBytes: 256000
  customSkillRoots:
    - "skills"
  maxRulesChars: 12000
  maxAgentMdChars: 12000

# crawl：web_fetch / web_search / browser（browser 启动参数另合并 renderer/playwright）
crawl:
  webFetch:
    timeoutSeconds: 30
    cacheTtlMinutes: 15
    maxChars: 50000
    maxResponseBytes: 2000000
    maxRedirects: 3
    pinDns: true
    readabilityEnabled: true
    userAgent: ""
    firecrawlApiKey: ""
    firecrawlBaseUrl: "https://api.firecrawl.dev"
    firecrawlEnabled: false
  webSearch:
    enabled: true
    provider: ""
    timeoutSeconds: 20
    cacheTtlMinutes: 15
    region: ""
    safeSearch: moderate
    country: ""
    parallelFree:
      url: "https://search.parallel.ai/mcp"
    brave:
      apiKey: ""
      baseUrl: ""
    perplexity:
      apiKey: ""
      openRouterApiKey: ""
      baseUrl: ""
      model: ""
    exa:
      apiKey: ""
      baseUrl: ""
    tavily:
      apiKey: ""
      baseUrl: ""
    parallel:
      apiKey: ""
      baseUrl: ""
    gemini:
      apiKey: ""
      baseUrl: ""
      model: ""
    kimi:
      apiKey: ""
      baseUrl: ""
      model: ""
    minimax:
      apiKey: ""
      baseUrl: ""
      region: ""
      apiHost: ""
    firecrawl:
      apiKey: ""
      baseUrl: ""
    searxng:
      baseUrl: ""
      categories: ""
      language: ""
    ollama:
      baseUrl: "http://127.0.0.1:11434"
      apiKey: ""
      cloudApiKey: ""
  browser:
    browserType: chromium
    headless: true
    wsEndpoint: ""
    executablePath: ""
    launchTimeoutMs: 120000
    navigationTimeoutMs: 60000
    maxTextChars: 50000
    screenshotMaxBytes: 4194304
    screenshotFontDir: ""
    screenshotFontUrlBase: ""
    screenshotFontFiles: []
    ssrfPolicy:
      allowPrivateNetwork: false

# 工具子系统（与 tools 工作流 file 配置对齐）
tools:
  file:
    workspace: ""
    maxReadChars: 500000
    readRawPreviewChars: 20000
    grepMaxResults: 100
    runEnabled: true
    runTimeoutMs: 120000
    maxCommandOutputChars: 200000
