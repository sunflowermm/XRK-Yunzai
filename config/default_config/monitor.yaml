# ========================================
# 系统监控配置（monitor）
# ========================================
# 实际生效路径：data/server_bots/{port}/monitor.yaml
# ----------------------------------------
enabled: true
# 检查间隔（毫秒）
interval: 120000
# ----------------------------------------
# 托管浏览器（仅 headless/puppeteer/playwright 等 Bot 进程，不碰用户桌面浏览器）
# ----------------------------------------
browser:
  enabled: true
  maxInstances: 5
  reserveNewest: true
# ----------------------------------------
memory:
  enabled: true
  systemThreshold: 85
  nodeThreshold: 85
  autoOptimize: true
  gcInterval: 600000
  leakDetection:
    # 堆持续增长告警（需 5 次采样才触发，且不会单独触发自动优化）
    enabled: false
    threshold: 0.1
    checkInterval: 300000
# ----------------------------------------
cpu:
  enabled: true
  threshold: 90
# ----------------------------------------
optimize:
  aggressive: false
  autoRestart: false
  restartThreshold: 95
# ----------------------------------------
report:
  enabled: true
  interval: 3600000
