# ========================================
# GPTGod LLM 配置
# ========================================
# GPTGod 大语言模型，OpenAI 兼容，支持识图与 tools
# 工厂类：GPTGodLLMClient
# 接口：https://api.gptgod.online/v1
# 配置文件实际路径：data/server_bots/{port}/gptgod_llm.yaml
# ----------------------------------------
# 基础
# ----------------------------------------
enabled: true
baseUrl: "https://api.gptgod.online/v1"
path: "/chat/completions"
apiKey: ""
model: "gemini-exp-1114"
temperature: 0.8
maxTokens: 6000
topP: 0.9
presencePenalty: 0.6
frequencyPenalty: 0.6
stop: ""
seed: null
timeout: 360000
# ----------------------------------------
# 流式与工具
# ----------------------------------------
enableStream: true
enableTools: true
toolChoice: "auto"
parallelToolCalls: true
maxToolRounds: 20
# ----------------------------------------
# 高级（可选）
# ----------------------------------------
# headers: {}   # 额外请求头
# extraBody: {} # 额外请求体
# tools: []     # 标准 OpenAI 格式 [{ type: "function", function: { name, description, parameters } }]
# ----------------------------------------
# 代理
# ----------------------------------------
proxy:
  enabled: false
  url: ""
