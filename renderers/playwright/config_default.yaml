# Playwright 渲染器默认配置（端口级覆盖：data/server_bots/{port}/renderers/playwright/config.yaml）
browserType: chromium
headless: true
restartNum: 100
playwrightTimeout: 120000
healthCheckInterval: 120000
maxRetries: 3
retryDelay: 2000
memoryThreshold: 1024
maxConcurrent: 3
waitUntil: domcontentloaded
waitImages: true
waitFonts: true
imageWaitTimeout: 800
fontWaitTimeout: 800
imgType: jpeg
quality: 85
viewport:
  width: 1280
  height: 720
  deviceScaleFactor: 1
args:
  - --no-sandbox
  - --disable-setuid-sandbox
  - --disable-dev-shm-usage
  - --disable-gpu
contextOptions:
  bypassCSP: true
  reducedMotion: reduce
blockResourceTypes:
  - media
